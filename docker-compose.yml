version: "3.9"

services:
  db:
    image: postgres:16
    container_name: fastapi_test_db
    environment:
      POSTGRES_DB: base_api_python
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d base_api_python"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: fastapi_test_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/base_api_python
    ports:
      - "8000:8000"

volumes:
  postgres_data:
